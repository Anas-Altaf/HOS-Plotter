services:
  - type: web
    name: hos-plotter-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    healthCheckPath: /api/health
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"
